<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>漫画翻译流水线</title>
    <link rel="icon" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">LOCAL MANGA STUDIO</p>
        <h1>漫画翻译流水线</h1>
      </div>
      <div class="top-actions">
        <span id="healthChip" class="chip">检查环境中</span>
        <button id="settingsButton" class="button secondary">API 设置</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="panel create-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">NEW JOB</p>
              <h2>新建翻译任务</h2>
            </div>
          </div>

          <label class="field">
            <span>任务名称</span>
            <input id="taskName" value="漫画翻译" maxlength="80" />
          </label>

          <div class="grid-two">
            <label class="field">
              <span>源语言</span>
              <select id="sourceLanguage">
                <option value="ja">日语</option>
                <option value="en">英语</option>
              </select>
            </label>
            <label class="field">
              <span>目标语言</span>
              <select id="targetLanguage">
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">繁体中文</option>
                <option value="en">英语</option>
                <option value="ja">日语</option>
                <option value="ko">韩语</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span>翻译提供方</span>
            <select id="provider">
              <option value="ollama">Ollama 本地模型</option>
              <option value="google">Google Cloud Translation</option>
              <option value="microsoft">Microsoft / Bing Translator</option>
            </select>
          </label>

          <div id="ollamaField" class="field">
            <span class="label-row">
              <span>Ollama 模型</span>
              <button id="refreshModels" class="text-button" type="button">刷新本地模型</button>
            </span>
            <select id="ollamaModel"></select>
            <small id="modelMeta">正在读取本机 Ollama 模型...</small>
          </div>

          <label id="polishField" class="check-row hidden">
            <input id="polishWithOllama" type="checkbox" />
            <span>
              <strong>使用 Ollama 润色在线译文</strong>
              <small>默认关闭，会增加处理时间</small>
            </span>
          </label>

          <label id="polishModelField" class="field hidden">
            <span>润色模型</span>
            <select id="polishModel"></select>
          </label>

          <details class="typesetting-options">
            <summary>初始排版选项</summary>
            <div class="grid-two">
              <label class="field">
                <span>文字方向</span>
                <select id="initialDirection">
                  <option value="auto">自动</option>
                  <option value="horizontal">横排</option>
                  <option value="vertical">竖排</option>
                </select>
              </label>
              <label class="field">
                <span>文字对齐</span>
                <select id="initialAlignment">
                  <option value="auto">自动</option>
                  <option value="left">左对齐</option>
                  <option value="center">居中</option>
                  <option value="right">右对齐</option>
                </select>
              </label>
            </div>
            <label class="field">
              <span>固定字号（留空自动）</span>
              <input id="initialFontSize" type="number" min="6" max="300" placeholder="自动适配气泡" />
            </label>
          </details>

          <div class="upload-card">
            <input id="singleInput" type="file" accept=".jpg,.jpeg,.png,.webp" hidden />
            <input id="folderInput" type="file" accept=".jpg,.jpeg,.png,.webp" webkitdirectory multiple hidden />
            <div class="upload-actions">
              <button id="singleButton" class="button secondary" type="button">选择单张图片</button>
              <button id="folderButton" class="button secondary" type="button">导入图片文件夹</button>
            </div>
            <div id="fileSummary" class="file-summary">尚未选择图片</div>
          </div>

          <button id="startButton" class="button primary full" type="button">开始翻译</button>
          <p id="formMessage" class="form-message"></p>
        </section>

        <section class="panel history-panel">
          <div class="section-heading compact">
            <h2>最近任务</h2>
            <button id="refreshTasks" class="text-button">刷新</button>
          </div>
          <div id="taskHistory" class="task-history empty-state">暂无任务</div>
        </section>
      </aside>

      <section class="workspace">
        <section class="panel status-panel">
          <div class="status-header">
            <div>
              <p class="eyebrow">ACTIVE JOB</p>
              <h2 id="activeTaskName">等待创建任务</h2>
              <p id="activeTaskMeta" class="muted">选择图片并开始翻译</p>
            </div>
            <span id="activeStatus" class="status-badge idle">空闲</span>
          </div>
          <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
          <div class="progress-meta">
            <span id="progressStage">未开始</span>
            <strong id="progressPercent">0%</strong>
          </div>
          <div id="imageStrip" class="image-strip empty-state">完成的图片会显示在这里</div>
        </section>

        <section class="panel studio-panel">
          <div class="tabs">
            <button class="tab active" data-tab="editor">校正与重嵌</button>
            <button class="tab" data-tab="logs">运行日志</button>
          </div>

          <div id="editorTab" class="tab-content active">
            <div class="editor-layout">
              <div class="canvas-column">
                <div class="compare-labels">
                  <span id="canvasModeLabel">翻译结果</span>
                  <a id="openOriginal" href="#" target="_blank">查看原图</a>
                </div>
                <div class="box-toolbar">
                  <div class="segmented" role="group" aria-label="编辑模式">
                    <button id="ocrModeButton" class="active" type="button">OCR框</button>
                    <button id="renderModeButton" type="button">译文框</button>
                  </div>
                  <button id="addRegionButton" class="text-button" type="button">新增 OCR 框</button>
                </div>
                <div id="canvasWrap" class="canvas-wrap empty-state">
                  <span>任务完成后，点击图片进入校正</span>
                  <img id="resultImage" alt="翻译结果" />
                  <div id="regionOverlay" class="region-overlay"></div>
                </div>
              </div>
              <aside id="regionEditor" class="region-editor">
                <div class="editor-placeholder">点击图片中的文本区域进行编辑</div>
                <div id="editorFields" class="hidden">
                  <div class="region-title">
                    <span id="regionNumber">区域 #1</span>
                    <span id="regionBox" class="muted"></span>
                  </div>
                  <div class="grid-four">
                    <label class="field">
                      <span>X</span>
                      <input id="regionX" type="number" min="0" />
                    </label>
                    <label class="field">
                      <span>Y</span>
                      <input id="regionY" type="number" min="0" />
                    </label>
                    <label class="field">
                      <span>宽</span>
                      <input id="regionW" type="number" min="2" />
                    </label>
                    <label class="field">
                      <span>高</span>
                      <input id="regionH" type="number" min="2" />
                    </label>
                  </div>
                  <label class="field">
                    <span>OCR 原文</span>
                    <textarea id="regionText" rows="4"></textarea>
                  </label>
                  <label class="field">
                    <span>译文</span>
                    <textarea id="regionTranslation" rows="5"></textarea>
                  </label>
                  <div class="grid-two">
                    <label class="field">
                      <span>字号</span>
                      <input id="regionFontSize" type="number" min="6" max="300" />
                    </label>
                    <label class="field">
                      <span>方向</span>
                      <select id="regionDirection">
                        <option value="auto">自动</option>
                        <option value="horizontal">横排</option>
                        <option value="vertical">竖排</option>
                      </select>
                    </label>
                  </div>
                  <div class="grid-two">
                    <label class="field">
                      <span>对齐</span>
                      <select id="regionAlignment">
                        <option value="auto">自动</option>
                        <option value="left">左对齐</option>
                        <option value="center">居中</option>
                        <option value="right">右对齐</option>
                      </select>
                    </label>
                    <div class="color-fields">
                      <label><span>文字</span><input id="regionForeground" type="color" /></label>
                      <label><span>描边</span><input id="regionOutline" type="color" /></label>
                    </div>
                  </div>
                  <button id="toggleRegionButton" class="button secondary full" type="button">禁用区域</button>
                  <button id="reprocessButton" class="button secondary full" type="button">重新识别并处理 OCR 框</button>
                  <button id="rerenderButton" class="button primary full">保存校正并重新嵌字</button>
                  <p id="editorMessage" class="form-message"></p>
                </div>
              </aside>
            </div>
          </div>

          <div id="logsTab" class="tab-content">
            <div class="log-toolbar">
              <span>实时显示运行状态、OCR、译文与错误</span>
              <button id="clearLogView" class="text-button">清空显示</button>
            </div>
            <div id="logWindow" class="log-window">
              <div class="empty-state">运行日志会显示在这里</div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <dialog id="settingsDialog">
      <form method="dialog" class="settings-form">
        <div class="section-heading">
          <div>
            <p class="eyebrow">LOCAL SETTINGS</p>
            <h2>API 与本地服务设置</h2>
          </div>
          <button class="icon-button" value="cancel" aria-label="关闭">×</button>
        </div>
        <label class="field">
          <span>Ollama 地址</span>
          <input id="ollamaBaseUrl" value="http://localhost:11434" />
        </label>
        <label class="field">
          <span>Google Cloud Translation API Key</span>
          <input id="googleApiKey" type="password" placeholder="留空则保留现有密钥" />
          <small id="googleState"></small>
        </label>
        <label class="field">
          <span>Microsoft Translator API Key</span>
          <input id="microsoftApiKey" type="password" placeholder="留空则保留现有密钥" />
          <small id="microsoftState"></small>
        </label>
        <div class="grid-two">
          <label class="field">
            <span>Microsoft 区域</span>
            <input id="microsoftRegion" placeholder="例如 eastasia" />
          </label>
          <label class="field">
            <span>Microsoft Endpoint</span>
            <input id="microsoftEndpoint" />
          </label>
        </div>
        <div class="dialog-actions">
          <button class="button secondary" value="cancel">取消</button>
          <button id="saveSettings" class="button primary" value="default" type="button">保存设置</button>
        </div>
        <p id="settingsMessage" class="form-message"></p>
      </form>
    </dialog>

    <script src="/static/app.js"></script>
  </body>
</html>
